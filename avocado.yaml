default_target: imx8mp-evk
supported_targets:
  - imx8mp-evk

extensions:
  avocado-bsp-imx8mp-evk:
    version: 0.1.0
    release: r0
    summary: Board support for the i.MX 8M Plus EVK
    description: Board support for the i.MX 8M Plus EVK
    license: Apache-2.0
    url: https://github.com/avocadolinux/avocado-os
    vendor: Avocado Linux <info@avocadolinux.org>

    modprobe:
      - moal

    on_merge:
      - udevadm control --reload
      - udevadm trigger --type=subsystems --action=add --settle
      - udevadm trigger --type=devices --action=add --settle

    overlay: overlay

    packages:
      # --- Crypto / Security (CAAM) ---
      kernel-module-caam: '*'
      kernel-module-caam-jr: '*'
      kernel-module-caamalg-desc: '*'
      kernel-module-caamhash-desc: '*'
      kernel-module-caamkeyblob-desc: '*'
      kernel-module-authenc: '*'
      kernel-module-crypto-engine: '*'
      kernel-module-error: '*'
      kernel-module-libdes: '*'
      kernel-module-secvio: '*'
      kernel-module-fsl-jr-uio: '*'
      kernel-module-crct10dif-ce: '*'
      kernel-module-polyval-ce: '*'
      kernel-module-polyval-generic: '*'
      # --- Audio / Sound ---
      kernel-module-snd-soc-fsl-sai: '*'
      kernel-module-snd-soc-fsl-xcvr: '*'
      kernel-module-snd-soc-fsl-micfil: '*'
      kernel-module-snd-soc-fsl-easrc: '*'
      kernel-module-snd-soc-fsl-asrc: '*'
      kernel-module-snd-soc-fsl-aud2htx: '*'
      kernel-module-snd-soc-fsl-utils: '*'
      kernel-module-snd-soc-fsl-asoc-card: '*'
      kernel-module-snd-soc-imx-audmux: '*'
      kernel-module-snd-soc-imx-hdmi: '*'
      kernel-module-snd-soc-imx-card: '*'
      kernel-module-snd-soc-wm8960: '*'
      kernel-module-imx-pcm-dma: '*'
      # --- Display ---
      kernel-module-dw-hdmi-cec: '*'
      # --- Media / Camera ---
      kernel-module-imx8-media-dev: '*'
      # --- CAN bus ---
      kernel-module-flexcan: '*'
      kernel-module-can-dev: '*'
      # --- WiFi (NXP 88W8997 / AW-CM276MA) ---
      kernel-module-moal: '*'
      kernel-module-mlan: '*'
      kernel-module-rfkill: '*'
      # --- WiFi (common USB dongles) ---
      kernel-module-rtw88-usb: '*'
      kernel-module-rtw88-8822bu: '*'
      kernel-module-rtw88-8822cu: '*'
      kernel-module-rtw88-8821cu: '*'
      kernel-module-rt2800usb: '*'
      kernel-module-mt7601u: '*'
      kernel-module-ath9k-htc: '*'
      # --- Bluetooth ---
      kernel-module-btnxpuart: '*'
      kernel-module-btusb: '*'
      kernel-module-btrtl: '*'
      kernel-module-ath3k: '*'
      # --- DSP ---
      kernel-module-imx-dsp-rproc: '*'
      # --- GPU / NPU (Vivante GC7000UL + VIP9000) ---
      kernel-module-galcore: '*'
      # --- Filesystems / Block ---
      kernel-module-fuse: '*'
      kernel-module-dm-mod: '*'
      # --- NFS (required by avocado-hitl / nfs-utils) ---
      kernel-module-nfsd: '*'
      # --- Compression / zram ---
      kernel-module-zram: '*'
      kernel-module-zsmalloc: '*'
      kernel-module-lz4: '*'
      kernel-module-lz4-compress: '*'
      # --- Firmware ---
      linux-firmware-imx-sdma-imx7d: '*'
      firmware-nxp-wifi-nxp8997-sdio: '*'
      firmware-nxp-wifi-nxp8997-pcie: '*'
      wireless-regdb-static: '*'

sdk:
  image: docker.io/avocadolinux/sdk:{{ env.AVOCADO_DISTRO_RELEASE }}-{{ env.AVOCADO_DISTRO_CHANNEL }}
